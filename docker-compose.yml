services:
  app:
    image: ghcr.io/hanifmmufid/fastapi-compose-lab:latest
    container_name: fastapi-compose-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: fastapi-compose-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:Y

